<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Water Stats</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="bg-bubbles"></div>
  <div class="stats-container">
    <div class="stats-top">
      <div class="date-stat">
        <span id="today-date"></span><br>
        <span id="user-badge"></span><br>
        <span id="goal-line"></span>
      </div>
      <div style="display:flex; gap:8px;">
        <a href="users.html" class="btn home-link">Switch User</a>
        <a href="index.html" class="btn home-link">Home</a>
      </div>
    </div>

    <h2 class="stats-title">📊 Water Stats</h2>
    <div class="stat-cards">
      <div class="stat-card">
        <h3>Weekly Avg</h3>
        <div class="stat-value"><span id="weekly-avg">0</span> ml/day</div>
        <span id="weekly-range"></span>
      </div>
      <div class="stat-card">
        <h3>Monthly Avg</h3>
        <div class="stat-value"><span id="monthly-avg">0</span> ml/day</div>
        <span id="monthly-range"></span>
      </div>
    </div>
    <div class="charts-grid">
      <div class="chart-block"><canvas id="weekly-chart"></canvas></div>
      <div class="chart-block"><canvas id="monthly-chart"></canvas></div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="firebase-config.js"></script>
  <script src="stats.js"></script>
  <script>
    function calcAge(dobStr){
      if (!dobStr) return null;
      const dob=new Date(dobStr), today=new Date();
      let age=today.getFullYear()-dob.getFullYear();
      const m=today.getMonth()-dob.getMonth();
      if(m<0||(m===0&&today.getDate()<dob.getDate())) age--;
      return age;
    }
    window.firebaseReady.then(async()=>{
      const sel=JSON.parse(localStorage.getItem("selectedUser")||"null");
      if(!sel) return;
      const doc=await db.collection("users").doc(sel.id).get();
      if(doc.exists){
        const u=doc.data();
        const lock = (u.password && u.password.trim() !== "") ? "🔒" : "🔓";
        document.getElementById("user-badge").textContent=`User: ${u.name} ${lock} (Age ${calcAge(u.dob)??"—"})`;
      }
    });
  </script>
</body>
</html>
