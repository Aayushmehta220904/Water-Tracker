<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Water Tracker</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="bg-bubbles"></div>
  <div class="app-shell">
    <div class="top-bar">
      <div class="date-stat">
        <span id="today-date"></span><br>
        <span id="user-badge"></span><br>
        <span id="goal-line"></span>
      </div>
      <div class="top-right-controls">
        <a class="btn stats-link" href="stats.html">Stats</a>
        <a class="btn home-link" href="users.html">Switch User</a>
        <button class="btn reset" onclick="resetToday()">Reset</button>
        <button class="btn delete" onclick="deleteAll()">Delete All</button>
      </div>
    </div>

    <div class="card">
      <h1>💧 Water Tracker 💧</h1>
      <div class="glass-row" id="glass-row"></div>
      <p class="total-water-text">
        <strong>Total Intake:</strong> <span id="total-water">0</span> ml
      </p>
      <div class="buttons predefined-buttons">
        <button onclick="addWater(100)">+100ml</button>
        <button onclick="addWater(250)">+250ml</button>
        <button onclick="addWater(500)">+500ml</button>
        <button onclick="addWater(1000)">+1L</button>
      </div>
      <div class="custom-add">
        <input type="number" id="custom-amount" placeholder="Custom amount (ml)"/>
        <button onclick="addCustom()">Add</button>
      </div>
    </div>
    <footer class="footer-note">Built by Aayush • Stay hydrated 🫶</footer>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="firebase-config.js"></script>
  <script src="script.js"></script>
  <script>
    function calcAge(dobStr){
      if (!dobStr) return null;
      const dob=new Date(dobStr), today=new Date();
      let age=today.getFullYear()-dob.getFullYear();
      const m=today.getMonth()-dob.getMonth();
      if(m<0||(m===0&&today.getDate()<dob.getDate())) age--;
      return age;
    }
    window.firebaseReady.then(async()=>{
      const sel=JSON.parse(localStorage.getItem("selectedUser")||"null");
      if(!sel) return;
      const doc=await db.collection("users").doc(sel.id).get();
      if(doc.exists){
        const u=doc.data();
        const lock = (u.password && u.password.trim() !== "") ? "🔒" : "🔓";
        document.getElementById("user-badge").textContent=`User: ${u.name} ${lock} (Age ${calcAge(u.dob)??"—"})`;
      }
    });
  </script>
</body>
</html>
